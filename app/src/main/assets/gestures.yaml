# Gesture Demo stack — authored in YAML (ADR-0011). Scripts use | block scalars.
name: Gesture Demo
width: 360
height: 640
script: |-
  on swipeLeft
    go next card
  end swipeLeft

  on swipeRight
    go previous card
  end swipeRight
backgrounds:
- id: 1
  name: nav
  buttons:
  - id: 90
    name: stacks
    rect:
      x: 10
      y: 6
      w: 110
      h: 30
    title: Stacks
    style: rectangle
    text_size: 14
    script: |-
      on mouseUp
        show stacks
      end mouseUp
cards:
- id: 1
  name: Card One
  background_id: 1
  fields:
  - id: 10
    name: title
    rect:
      x: 20
      y: 40
      w: 320
      h: 60
    text: CARD 1
    locked: true
    text_size: 30
    text_align: center
    text_style: bold
  - id: 11
    name: hint
    rect:
      x: 20
      y: 120
      w: 320
      h: 120
    text: Swipe LEFT for next card. Long-press the button.
    locked: true
    text_size: 16
    text_align: center
  - id: 12
    name: status
    rect:
      x: 20
      y: 430
      w: 320
      h: 50
    text: 'status: idle'
    locked: true
    text_size: 18
    text_align: center
  buttons:
  - id: 13
    name: press
    rect:
      x: 80
      y: 300
      w: 200
      h: 80
    title: Long-press me
    text_size: 18
    script: |-
      on longPress
        put "status: LONG-PRESSED" into field "status"
      end longPress

      on doubleTap
        put "status: DOUBLE-TAPPED" into field "status"
      end doubleTap
  # A switch (ADR-0015): a button with `checked`. In native mode it's a Material Switch; on
  # Canvas it shows ☑/☐. Toggling auto-flips `checked`, then the handler reads it.
  - id: 15
    name: wifi
    rect:
      x: 20
      y: 250
      w: 320
      h: 40
    title: Wi-Fi
    checked: false
    text_size: 18
    script: |-
      on mouseUp
        if the checked of me then put "status: Wi-Fi ON" into field "status"
        else put "status: Wi-Fi OFF" into field "status"
      end mouseUp
  - id: 14
    name: toProd
    rect:
      x: 80
      y: 500
      w: 200
      h: 50
    title: Open Productivity
    text_size: 16
    style: rectangle
    script: |-
      on mouseUp
        go to stack "Productivity"
      end mouseUp
  # `free` layout (ADR-0017): native mode places objects by their absolute rects, like Canvas.
  layout:
    mode: free
    children: [90, 10, 11, 12, 13, 15, 14]
- id: 2
  name: Card Two
  background_id: 1
  fields:
  - id: 20
    name: title
    rect:
      x: 20
      y: 40
      w: 320
      h: 60
    text: CARD 2
    locked: true
    text_size: 30
    text_align: center
    text_style: bold
  - id: 21
    name: hint
    rect:
      x: 20
      y: 120
      w: 320
      h: 160
    text: Swipe RIGHT to go back. Swipe LEFT for card 3.
    locked: true
    text_size: 16
    text_align: center
- id: 3
  name: Card Three
  background_id: 1
  fields:
  - id: 30
    name: title
    rect:
      x: 20
      y: 40
      w: 320
      h: 60
    text: CARD 3
    locked: true
    text_size: 30
    text_align: center
    text_style: bold
  - id: 31
    name: hint
    rect:
      x: 20
      y: 120
      w: 320
      h: 120
    text: Swipe RIGHT to go back to card 2.
    locked: true
    text_size: 16
    text_align: center
